<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expert Review{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="{{ url_for('dashboard') }}">LLM Output Expert Review</a>
        {% if username %}
        <div class="d-flex align-items-center gap-3">
            <span class="text-light">{{ username }}</span>
            {% if username == 'admin' %}
            <a href="{{ url_for('admin') }}" class="btn btn-sm btn-outline-warning">Admin</a>
            {% endif %}
            <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-light">Logout</a>
        </div>
        {% endif %}
    </nav>
    <div class="container-fluid px-4 py-3">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
