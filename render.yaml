databases:
  - name: expert-review-db
    plan: free
    databaseName: expert_reviews

services:
  - type: web
    name: expert-review-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expert-review-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
